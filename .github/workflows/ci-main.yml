name: Main CI

on:
  push:
    branches: [main]

concurrency:
  group: main-${{ github.sha }}

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm -r run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm -r run lint

  test-all:
    name: Test (all packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm -r run test

  build-all:
    name: Build all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm -r run build
      - run: |
          if [ -d "packages/web" ]; then
            cd packages/web && pnpm build
          else
            echo "packages/web not yet created, skipping"
          fi
