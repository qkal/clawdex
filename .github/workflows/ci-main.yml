name: Main CI

on:
  push:
    branches: [main]

concurrency:
  group: main-${{ github.sha }}

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm -r --filter "./packages/**" run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm -r --filter "./packages/**" --if-present run lint

  test-all:
    name: Test (all packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm -r --filter "./packages/**" --if-present run test --pass-with-no-tests

  test-integration:
    name: Integration (all packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm -r --filter "./packages/**" --if-present run test:integration --pass-with-no-tests

  build-all:
    name: Build all
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm -r --filter "./packages/**" --if-present run build
