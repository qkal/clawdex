name: PR CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm -r --filter "./packages/**" run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm -r --filter "./packages/**" --if-present run lint

  test-unit:
    name: Test (changed packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: pnpm -r --filter "./packages/**...[origin/${{ github.base_ref }}]" --if-present run test --pass-with-no-tests

  test-integration:
    name: Integration (changed packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: pnpm -r --filter "./packages/**...[origin/${{ github.base_ref }}]" --if-present run test:integration --pass-with-no-tests

  build-packages:
    name: Build (changed packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: pnpm -r --filter "./packages/**...[origin/${{ github.base_ref }}]" --if-present run build

  build-web:
    name: Build web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: pnpm -r --filter "./packages/web...[origin/${{ github.base_ref }}]" --if-present run build
