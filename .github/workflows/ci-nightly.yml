name: Nightly CI

on:
  schedule:
    - cron: "0 4 * * *" # 4am UTC daily
  workflow_dispatch:

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm -r --filter "./packages/**" --if-present run test --pass-with-no-tests
      - run: pnpm -r --filter "./packages/**" --if-present run test:integration --pass-with-no-tests

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm -r --filter "./packages/**" --if-present run test --pass-with-no-tests
      - run: pnpm -r --filter "./packages/**" --if-present run test:integration --pass-with-no-tests

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm audit --audit-level=high || true
        # `|| true` because audit exits non-zero on findings;
        # we want the job to report but not block nightly.
